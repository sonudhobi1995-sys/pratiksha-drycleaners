<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>प्रतीक्षा ड्राइवर स्टेशन | PRATIKSHA</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@400;600;700&family=Mukta:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --midnight: #010409;
            --pure-moon: #ffffff;
            --accent-gold: #FFD700;
            --sun-orange: #FF8C00;
        }

        body { 
            font-family: 'Inter', 'Mukta', sans-serif; 
            background: var(--midnight); 
            color: white; 
            margin: 0; 
            padding-bottom: 100px; 
            background-image: radial-gradient(1.5px 1.5px at 20px 30px, #fff, transparent), radial-gradient(2px 2px at 150px 150px, #fff, transparent);
            background-size: 200px 200px;
            background-attachment: fixed;
        }

        .app-header { padding: 25px 15px; text-align: center; }
        .app-logo { width: 70px; height: 70px; border-radius: 50%; background: white; padding: 5px; border: 2px solid var(--sun-orange); box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); }

        .card { 
            background: var(--pure-moon); 
            padding: 22px; border-radius: 30px; 
            margin: 0 15px 20px 15px; 
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
            color: #000;
        }
        
        h3 { color: #000; font-family: 'Playfair Display', serif; border-bottom: 2px solid var(--sun-orange); display: inline-block; margin-bottom: 15px; }

        .input-group { display: flex; gap: 10px; margin: 8px 0 12px 0; }
        .input-group input { margin: 0; flex: 1; }
        
        .btn-contact { 
            padding: 0 15px; border-radius: 12px; border: 1.5px solid var(--sun-orange); 
            background: rgba(255,140,0,0.1); color: var(--sun-orange); cursor: pointer; font-size: 1.2rem; 
        }

        label { font-size: 0.75rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-top: 10px; display: block; }

        input, select { 
            width: 100%; padding: 14px; margin: 8px 0 12px 0; 
            border-radius: 12px; border: 1.5px solid #cbd5e1; 
            background: #f1f5f9; color: #000; font-size: 1rem;
            box-sizing: border-box; font-weight: 600;
        }

        .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .cat-btn { background: #e2e8f0; border: 1px solid #cbd5e1; padding: 10px 5px; border-radius: 12px; font-size: 0.7rem; font-weight: 800; color: #475569; cursor: pointer; }
        .cat-btn.active { background: var(--sun-orange); color: white; border-color: var(--sun-orange); }

        .btn-add { background: #000; color: #fff; width: 100%; padding: 15px; border-radius: 12px; font-weight: 800; border: none; margin-bottom: 10px; }
        .btn-primary { background: var(--sun-orange); color: #fff; width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 800; text-transform: uppercase; }
        .btn-success { background: #128C7E; color: #fff; width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 800; text-transform: uppercase; }

        #liveList { margin-top: 10px; font-size: 0.85rem; background: #f8fafc; padding: 12px; border-radius: 15px; border: 1px dashed #cbd5e1; color: #334155; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(1, 4, 9, 0.98); display: flex; justify-content: space-around; padding: 15px 0 25px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-item { background: none; border: none; color: #64748b; font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; gap: 5px; font-weight: 700; cursor: pointer; }
        .nav-item.active { color: var(--pure-moon); }
        .nav-item span { font-size: 1.5rem; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="app-header">
        <img src="logo.png" alt="PRATIKSHA" class="app-logo">
        <h2 style="margin:0; font-family:'Playfair Display'; font-size: 1.4rem; letter-spacing: 2px;">LOGISTICS HUB</h2>
    </div>

    <div class="container">
        <div id="pickup-sec" class="app-sec">
            <div class="card">
                <h3>🧺 नया पिकअप</h3>
                <label>ग्राहक मोबाइल</label>
                <div class="input-group">
                    <input type="tel" id="pickMobile" placeholder="9929xxxxxx">
                    <button type="button" class="btn-contact" onclick="getContact('pickMobile')">👤</button>
                </div>
                
                <label>श्रेणी (Category)</label>
                <div class="cat-grid">
                    <button class="cat-btn" onclick="loadItems('men', this)">पुरुष</button>
                    <button class="cat-btn" onclick="loadItems('women', this)">महिला</button>
                    <button class="cat-btn" onclick="loadItems('kids', this)">बच्चे</button>
                    <button class="cat-btn" onclick="loadItems('home', this)">होम</button>
                    <button class="cat-btn" onclick="loadItems('winter', this)">विंटर</button>
                    <button class="cat-btn" onclick="loadItems('other', this)">अन्य</button>
                </div>

                <select id="itemSelect"><option value="">श्रेणी चुनें...</option></select>
                <select id="serviceType">
                    <option value="प्रेस">💨 सामान्य प्रेस</option>
                    <option value="स्टीम प्रेस">💎 कीमती स्टीम प्रेस</option>
                    <option value="धुलाई प्रेस">🧼 धुलाई प्रेस</option>
                    <option value="ड्राई क्लीनिंग प्रेस">✨ ड्राई क्लीनिंग प्रेस</option>
                </select>

                <div style="display:flex; gap:10px;">
                    <input type="number" id="itemQty" value="1" style="flex:1;">
                    <select id="itemNote" style="flex:1;"><option value="OK">OK</option><option value="दाग">दाग</option><option value="कटा">कटा</option></select>
                </div>

                <button onclick="addToInv()" class="btn-add">+ लिस्ट में जोड़ें</button>
                <div id="liveList"><b>📋 लिस्ट:</b><div id="listContent"></div></div>
                <button class="btn-primary" style="margin-top:15px;" id="pickBtn" onclick="submitPickup()">संग्रह संपन्न करें</button>
            </div>
        </div>

        <div id="delivery-sec" class="app-sec hidden">
            <div class="card">
                <h3>🚚 डिलीवरी मिशन</h3>
                <label>ग्राहक मोबाइल</label>
                <div class="input-group">
                    <input type="tel" id="delMobile" placeholder="मोबाइल नंबर लिखें">
                    <button type="button" class="btn-contact" onclick="getContact('delMobile')">👤</button>
                </div>
                
                <label>कुल प्राप्त राशि (₹)</label>
                <input type="number" id="amount" placeholder="0.00">
                
                <button class="btn-success" id="delBtn" onclick="confirmDelivery()">डिलीवरी संपन्न करें ✅</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="nav-pick" onclick="switchTab('pickup-sec', 'nav-pick')"><span>🧺</span>पिकअप</div>
        <div class="nav-item" id="nav-del" onclick="switchTab('delivery-sec', 'nav-del')"><span>🚚</span>डिलीवरी</div>
    </div>

<script>
    // 👤 जादुई कांटेक्ट पिकर
    async function getContact(mobileId) {
        if (!('contacts' in navigator)) return alert("क्षमा करें! यह सुविधा केवल क्रोम ब्राउज़र पर काम करती है।");
        try {
            const props = ['tel'];
            const contacts = await navigator.contacts.select(props, {multiple: false});
            if (contacts.length > 0) {
                let rawNum = contacts[0].tel[0].replace(/\D/g, '');
                document.getElementById(mobileId).value = rawNum.slice(-10);
            }
        } catch (err) { console.log(err); }
    }

    function switchTab(secId, navId) {
        document.querySelectorAll('.app-sec').forEach(sec => sec.classList.add('hidden'));
        document.getElementById(secId).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        document.getElementById(navId).classList.add('active');
        window.scrollTo(0,0);
    }

    const inventory = {
        men: ["शर्ट", "पेंट", "जींस", "टी-शर्ट", "सूट", "कोट", "कुर्ता", "पायजामा", "रेगुलर कपड़े", "अन्य (डिजाइनर)"],
        women: ["साड़ी", "भारी साड़ी", "सूट सलवार", "कुर्ती", "लहंगा", "दुपट्टा", "रेगुलर कपड़े", "अन्य (डिजाइनर)"],
        kids: ["बाबा सूट", "फ्रॉक", "निक्कर", "स्कूल ड्रेस", "रेगुलर कपड़े", "अन्य"],
        home: ["बेड शीट", "पर्दे", "कंबल", "तौलिया", "कालीन", "कुशन कवर", "अन्य"],
        winter: ["जैकैट", "स्वेटर", "कार्डिगन", "कोट", "अन्य"],
        other: ["बैग", "टोपी", "मोजे", "रुमाल", "अन्य सामान"]
    };

    function loadItems(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const sel = document.getElementById('itemSelect');
        sel.innerHTML = '<option value="">कपड़ा चुनें</option>';
        inventory[cat].forEach(i => { sel.innerHTML += `<option value="${i}">${i}</option>`; });
    }

    let selectedItems = [];
    function addToInv() {
        const item = document.getElementById('itemSelect').value;
        const qty = document.getElementById('itemQty').value;
        const service = document.getElementById('serviceType').value;
        const note = document.getElementById('itemNote').value;
        if(!item || !qty) return alert("संख्या लिखें!");
        const entry = `${item} (${qty} नग) - ${service} [${note}]`;
        selectedItems.push(entry);
        document.getElementById('listContent').innerHTML += `<div style="padding:4px 0; border-bottom:1px solid #eee;">• ${entry}</div>`;
        document.getElementById('itemQty').value = "1";
    }

    function submitPickup() {
        const mobile = document.getElementById('pickMobile').value;
        if(!mobile || selectedItems.length === 0) return alert("अधूरा डेटा!");
        alert("संग्रह सफल! भगवान आपका दिन शुभ करें।");
        location.reload();
    }

    function confirmDelivery() {
        const amt = document.getElementById('amount').value;
        if(!amt) return alert("राशि लिखें!");
        alert("डिलीवरी सफल! मिशन पूरा हुआ। ✅");
        location.reload();
    }
</script>
</body>
</html>
