<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order | PRATIKSHA DRY CLEANERS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sun-orange: #FF8C00;
            --saturn-blue: #001F3F;
            --mercury-green: #2E8B57;
            --cream-bg: #FFFDD0;
        }
        body { font-family: 'Inter', sans-serif; background: var(--cream-bg); margin: 0; padding: 20px; color: var(--saturn-blue); }
        .track-container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 5px solid var(--sun-orange); }
        
        .status-header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: var(--sun-orange); text-decoration: none; font-weight: bold; font-size: 0.9rem; }

        .step-container { display: flex; flex-direction: column; gap: 20px; margin-top: 20px; position: relative; }
        .step { display: flex; align-items: center; gap: 15px; opacity: 0.3; transition: 0.5s; }
        .step.active { opacity: 1; font-weight: bold; }
        .circle { width: 30px; height: 30px; border-radius: 50%; background: #ddd; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.8rem; z-index: 1; }
        .active .circle { background: var(--mercury-green); box-shadow: 0 0 10px var(--mercury-green); }
        
        .line { position: absolute; left: 14px; top: 0; width: 2px; height: 100%; background: #ddd; z-index: 0; }
        
        .inventory-card { 
            background: #fffde7; border: 1px dashed var(--sun-orange); 
            border-radius: 12px; padding: 15px; margin-top: 30px; 
            text-align: left; font-size: 0.9rem; color: #444;
        }
        .inventory-title { 
            font-weight: bold; color: var(--saturn-blue); 
            border-bottom: 1px solid #ddd; padding-bottom: 8px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        #inventoryList div { margin-bottom: 6px; padding-left: 10px; border-left: 3px solid var(--sun-orange); }

        .refresh-btn { display: block; width: 100%; margin-top: 25px; background: none; border: 1px solid #ddd; padding: 10px; border-radius: 8px; color: #888; cursor: pointer; font-size: 0.8rem; }
        
        .wa-btn { width: 100%; margin-top: 20px; background: #25D366; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 0.9rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="track-container">
        <a href="index.html" class="back-btn">← वापस होम पर</a>
        <div class="status-header">
            <h2 style="margin:0;">ऑर्डर ट्रैकिंग</h2>
            <p style="font-size: 0.8rem; color: #666; margin-top: 5px;">मोबाइल: <span id="dispMobile">...</span></p>
        </div>

        <div class="step-container">
            <div class="line"></div>
            <div class="step" id="step1"><div class="circle">1</div> 🧺 प्रक्रिया में (In Process)</div>
            <div class="step" id="step2"><div class="circle">2</div> 🧼 धुलाई (Washing)</div>
            <div class="step" id="step3"><div class="circle">3</div> 👔 आयरनिंग (Ironing)</div>
            <div class="step" id="step4"><div class="circle">4</div> ✅ रेडी टू डिलीवरी (Ready)</div>
            <div class="step" id="step5"><div class="circle">5</div> 🚚 डिलीवर कर दिया (Delivered)</div>
        </div>

        <div class="inventory-card">
            <div class="inventory-title">🧺 कपड़ों की सूची (Inventory) <span>✨</span></div>
            <div id="inventoryList">विवरण लोड हो रहा है...</div>
        </div>

        <button class="wa-btn" onclick="sendToWhatsApp()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="20"> यह लिस्ट व्हाट्सएप पर मंगाएं
        </button>

        <button class="refresh-btn" onclick="location.reload()">🔄 स्टेटस रिफ्रेश करें</button>
    </div>

    <script>
        // --- आपका अंतिम रामबाण V4 Google Script URL ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzjxuEKlq41GrTwymM1Ywb1AjHhZ-qd6e865F65zf02Eiw4ZkVFnWNw_IwLPGVVv7yH6A/exec';
        
        let globalStatus = "Loading...";
        let globalDetails = "Loading...";

        window.onload = function() {
            const mobile = localStorage.getItem('userMobile');
            if (!mobile) { window.location.href = "login.html"; return; }
            document.getElementById('dispMobile').innerText = mobile;

            // Google Sheet से स्टेटस और विवरण लाना
            fetch(`${scriptURL}?action=getStatus&mobile=${mobile}`)
            .then(response => response.json())
            .then(data => {
                if(data.status === "Not Found" || !data.details) {
                    document.getElementById('inventoryList').innerText = "कोई सक्रिय ऑर्डर नहीं मिला।";
                    updateSteps("None");
                    return;
                }

                globalStatus = data.status || "प्रक्रिया में";
                globalDetails = data.details || "विवरण उपलब्ध नहीं है";

                // सूची को अपडेट करना
                const invList = document.getElementById('inventoryList');
                invList.innerHTML = '';
                // कोमा से अलग कर के लिस्ट दिखाना
                const items = globalDetails.split(',');
                items.forEach(item => {
                    if(item.trim()) invList.innerHTML += `<div>${item.trim()}</div>`;
                });

                // ट्रैकिंग स्टेप्स को अपडेट करना
                updateSteps(globalStatus);
            })
            .catch(err => {
                console.error("Error fetching status:", err);
                document.getElementById('inventoryList').innerText = "सर्वर से संपर्क नहीं हो पाया।";
            });
        };

        function updateSteps(status) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            
            const steps = {
                "प्रक्रिया में": 1,
                "In Process": 1,
                "धुलाई": 2,
                "Washing": 2,
                "आयरनिंग": 3,
                "आयरन": 3,
                "प्रेस": 3,
                "Ironing": 3,
                "रेडी टू डिलीवरी": 4,
                "Ready": 4,
                "Delivered": 5,
                "डिलीवर कर दिया": 5
            };

            const currentLevel = steps[status] || 0;
            for(let i=1; i<=currentLevel; i++) {
                const stepElement = document.getElementById('step' + i);
                if(stepElement) stepElement.classList.add('active');
            }
        }

        function sendToWhatsApp() {
            const mobile = localStorage.getItem('userMobile');
            const name = localStorage.getItem('userName') || "ग्राहक";
            if(!mobile) return;

            const msg = `*प्रतीक्षा ड्राई क्लीनर्स* 🧺✨\n\n*नमस्ते ${name},*\nआपका ऑर्डर स्टेटस: *${globalStatus}*\n\n*कपड़ों की सूची:*\n${globalDetails.split(',').join('\n')}\n\nधन्यवाद! 🙏`;
            window.open(`https://wa.me/91${mobile}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
