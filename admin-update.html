<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ग्राहक पंजीकरण | प्रतीक्षा ड्राई क्लीनर्स</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Mukta:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --sun: #FF8C00; 
            --dark: #001F3F; 
            --bg: #f8fafd; 
            --card-bg: #ffffff;
        }

        body { 
            font-family: 'Inter', 'Mukta', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            color: #333;
        }

        .app-header { 
            background: linear-gradient(135deg, var(--dark) 0%, #003366 100%); 
            color: white; 
            padding: 30px 15px; 
            text-align: center; 
            border-radius: 0 0 35px 35px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .container { padding: 25px 15px; max-width: 500px; margin: auto; }

        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 10px 25px rgba(0,31,63,0.05); 
            margin-bottom: 25px; 
            border: 1px solid rgba(0,0,0,0.02);
        }

        h3 { color: var(--dark); margin: 0 0 20px 0; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        label { font-size: 0.85rem; font-weight: 600; color: #666; margin-bottom: 8px; display: block; padding-left: 5px; }

        input { 
            width: 100%; padding: 16px; margin-bottom: 20px; 
            border-radius: 15px; border: 2px solid #edf2f7; 
            font-size: 1rem; box-sizing: border-box;
            background: #fcfcfc; transition: 0.3s;
        }
        
        input:focus { border-color: var(--sun); outline: none; background: white; }

        .btn-submit { 
            width: 100%; padding: 18px; 
            background: var(--sun); 
            color: white; 
            border: none; 
            border-radius: 18px; 
            font-weight: 700; 
            font-size: 1.1rem; 
            cursor: pointer; 
            box-shadow: 0 8px 20px rgba(255,140,0,0.3);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-submit:active { transform: scale(0.96); }

        .back-link {
            display: block; text-align: center; margin-top: 20px;
            color: var(--dark); text-decoration: none; font-weight: 600; font-size: 0.9rem;
        }

        .system-tag { text-align: center; margin-top: 30px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

    <div class="app-header">
        <h2 style="margin:0; font-weight: 700;">प्रतीक्षा ड्राई क्लीनर्स</h2>
        <p style="margin:5px 0 0 0; opacity: 0.8; font-size: 14px;">ग्राहक पंजीकरण पोर्टल</p>
    </div>

    <div class="container">
        <div class="card">
            <h3>👤 नए ग्राहक की जानकारी</h3>
            
            <label>ग्राहक का नाम</label>
            <input type="text" id="custName" placeholder="पूरा नाम लिखें">

            <label>मोबाइल नंबर</label>
            <input type="tel" id="custMobile" placeholder="10 अंकों का नंबर">

            <label>घर/मकान नंबर (Address)</label>
            <input type="text" id="houseNo" placeholder="जैसे: 45, अम्बाबाड़ी">

            <button class="btn-submit" id="regBtn" onclick="registerCustomer()">
                सिस्टम में दर्ज करें ✨
            </button>
        </div>

        <a href="admin.html" class="back-link">← एडमिन पैनल पर वापस जाएं</a>

        <div class="system-tag">
            प्रतीक्षा एवं नीति के उज्जवल भविष्य हेतु | Titu 5G संचालित
        </div>
    </div>

    <script>
        // आपका लेटेस्ट 5G इंजन URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzjxuEKlq41GrTwymM1Ywb1AjHhZ-qd6e865F65zf02Eiw4ZkVFnWNw_IwLPGVVv7yH6A/exec';

        function registerCustomer() {
            const name = document.getElementById('custName').value;
            const mobile = document.getElementById('custMobile').value;
            const house = document.getElementById('houseNo').value;
            const btn = document.getElementById('regBtn');

            if(!name || mobile.length < 10) {
                alert("कृपया नाम और सही मोबाइल नंबर भरें।");
                return;
            }

            btn.innerText = "दर्ज किया जा रहा है...";
            btn.disabled = true;

            // गूगल शीट में एक्शन: addCustomer
            const finalURL = `${scriptURL}?action=addCustomer&name=${encodeURIComponent(name)}&mobile=${mobile}&houseNo=${encodeURIComponent(house)}`;

            fetch(finalURL, { method: 'GET', mode: 'no-cors' });

            setTimeout(() => {
                alert("बधाई हो! ग्राहक का विवरण सिस्टम में दर्ज कर लिया गया है। ✅");
                
                // ग्राहक को स्वागत मैसेज भेजने का विकल्प
                const welcomeMsg = `*प्रतीक्षा ड्राई क्लीनर्स* 🧺✨\n--------------------------------\nनमस्ते *${name}* जी,\n\nहमें खुशी है कि आप हमारी 'अनुभव शाला' से जुड़े। अब आप घर बैठे अपने कपड़ों का स्टेटस चेक कर सकते हैं।\n\nधन्यवाद! 🙏`;
                window.open(`https://wa.me/91${mobile}?text=${encodeURIComponent(welcomeMsg)}`, '_blank');

                location.reload();
            }, 1500);
        }
    </script>
</body>
</html>
