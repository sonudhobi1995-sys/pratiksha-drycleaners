<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>प्रतीक्षा डैशबोर्ड | Moonlight White</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;700&family=Mukta:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --pure-moon: #ffffff;
            --midnight: #010409;
            --accent-gold: #FFD700;
            --glass-white: rgba(255, 255, 255, 0.95);
        }

        body { 
            font-family: 'Inter', 'Mukta', sans-serif; 
            background: var(--midnight); 
            color: white;
            margin: 0; padding: 15px;
            background-image: 
                radial-gradient(2px 2px at 40px 60px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 100px 150px, #fff, rgba(0,0,0,0)),
                radial-gradient(2.5px 2.5px at 200px 50px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.2px 1.2px at 300px 250px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 150px 350px, #fff, rgba(0,0,0,0));
            background-size: 300px 300px;
            background-attachment: fixed;
        }

        /* 🌙 चाँद जैसा लोगो */
        .moon-logo-container { text-align: center; padding: 40px 0 20px 0; }
        .moon-logo {
            width: 100px; height: 100px; border-radius: 50%;
            background: white; padding: 8px; border: 3px solid var(--pure-moon);
            box-shadow: 0 0 60px 15px rgba(255, 255, 255, 0.4);
        }

        .header h2 { 
            text-align: center; font-family: 'Playfair Display', serif; 
            letter-spacing: 2px; text-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        /* मुख्य कार्ड */
        .card-main { 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(10px);
            padding: 25px; border-radius: 30px; 
            text-align: center; border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
        }
        
        .card-main h2 { font-size: 3rem; color: var(--accent-gold); margin: 10px 0; }

        /* ⭐ विशेष व्हाइट ग्रिड बॉक्सेस (पेंडिंग, धुलाई आदि) */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        
        .stat-box { 
            background: var(--glass-white); /* शुद्ध सफ़ेद बैकग्राउंड */
            padding: 20px 10px; border-radius: 22px; 
            text-align: center; 
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2), inset 0 0 10px rgba(0,0,0,0.05);
            transition: 0.3s;
            border: none;
        }

        .stat-box h4 { 
            margin: 0; color: #475569; /* डार्क ग्रे टेक्स्ट पढ़ने के लिए */
            font-size: 0.75rem; letter-spacing: 1px; font-weight: 800;
        }

        .stat-box p { 
            margin: 5px 0 0; font-size: 2.2rem; 
            font-weight: 900; color: #000000; /* नंबर्स एकदम काले और साफ़ */
        }

        /* अपडेट बटन */
        .refresh-btn { 
            width: 100%; padding: 20px; 
            background: #ffffff; color: #000; border: none; border-radius: 22px; 
            font-size: 1.1rem; font-weight: 800; margin-top: 25px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .back-nav {
            display: block; text-align: center; margin-top: 20px; color: white;
            text-decoration: none; font-weight: 700; padding: 15px; 
            border: 1px solid rgba(255,255,255,0.3); border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="moon-logo-container">
        <img src="logo.png" alt="PRATIKSHA" class="moon-logo">
    </div>

    <div class="header">
        <h2>प्रतीक्षा डैशबोर्ड</h2>
        <p style="text-align:center; color: var(--accent-gold); font-size: 11px; font-weight: 700; letter-spacing: 2px;">।। शुभ लाभ ।।</p>
    </div>

    <div class="container">
        <div class="card-main">
            <span style="font-size: 0.8rem; opacity: 0.8;">आज की संचित लक्ष्मी</span>
            <h2 id="todayColl">₹ 0</h2>
        </div>

        <div class="grid">
            <div class="stat-box"><h4>पेंडिंग</h4><p id="pending">0</p></div>
            <div class="stat-box"><h4>धुलाई</h4><p id="washing">0</p></div>
            <div class="stat-box"><h4>सिद्ध (Ready)</h4><p id="ready">0</p></div>
            <div class="stat-box"><h4>ऋणानुबंध</h4><p id="customers">0</p></div>
        </div>

        <button class="refresh-btn" onclick="fetchData()">🔄 डेटा अपडेट करें</button>
        <a href="admin-update.html" class="back-nav">← स्टेशन पर जाएं</a>
    </div>

    <script>
        // ... (पुराना Script ही रहेगा) ...
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzlTe0mIbSAS1xxgy3imkn3M6AoR4HkCed-XHDy2lSln2j9kA74rBYoITi2iki90qdu/exec';
        function fetchData() {
            const btn = document.querySelector('.refresh-btn');
            btn.innerText = "हिसाब मिल रहा है...";
            fetch(`${scriptURL}?action=getDashboardData`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('todayColl').innerText = '₹ ' + (data.todayColl || 0);
                document.getElementById('pending').innerText = data.pending || 0;
                document.getElementById('washing').innerText = data.washing || 0;
                document.getElementById('ready').innerText = data.ready || 0;
                document.getElementById('customers').innerText = data.totalCustomers || 0;
                btn.innerText = "🔄 डेटा अपडेट करें";
            }).catch(e => { btn.innerText = "🔄 डेटा अपडेट करें"; });
        }
        window.onload = fetchData;
    </script>
</body>
</html>
