<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>डैशबोर्ड | प्रतीक्षा ड्राई क्लीनर्स</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Mukta:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --main: #FF8C00; --dark: #001F3F; --light: #f0f4f8; --white: #ffffff; }
        body { font-family: 'Inter', 'Mukta', sans-serif; background: var(--light); margin: 0; padding: 15px; }
        
        .header { text-align: center; padding: 20px 0; color: var(--dark); }
        
        /* मुख्य कार्ड का शाही लुक */
        .card-main { 
            background: linear-gradient(135deg, var(--dark) 0%, #003366 100%); 
            color: white; padding: 35px 20px; border-radius: 28px; 
            text-align: center; box-shadow: 0 15px 35px rgba(0,31,63,0.25); 
            margin-bottom: 25px; border-bottom: 6px solid var(--main); 
        }
        .card-main h2 { font-size: 3.2rem; margin: 10px 0; color: var(--main); font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .card-main span { opacity: 0.85; letter-spacing: 1.5px; font-size: 0.85rem; text-transform: uppercase; font-weight: 600; }

        /* ग्रिड सिस्टम */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
        
        /* इन 4 बॉक्सेस को अब 'स्पेशल इफेक्ट' दिया गया है */
        .stat-box { 
            background: var(--white); 
            padding: 22px 15px; 
            border-radius: 22px; 
            text-align: center; 
            position: relative;
            overflow: hidden;
            /* 3D शैडो इफेक्ट */
            box-shadow: 0 8px 20px rgba(0,0,0,0.06); 
            border: 1px solid rgba(0,0,0,0.03);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* बॉक्स के अंदर का केसरिया टच */
        .stat-box::before {
            content: ""; position: absolute; left: 0; top: 0; 
            height: 100%; width: 6px; background: var(--main);
        }

        .stat-box h4 { margin: 0; color: #7f8c8d; font-size: 0.75rem; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
        
        /* नंबरों को बड़ा और गहरा (Bold) बनाया गया है */
        .stat-box p { margin: 12px 0 0; font-size: 1.8rem; font-weight: 800; color: var(--dark); }

        /* अपडेट बटन का स्पेशल इफेक्ट */
        .refresh-btn { 
            width: 100%; padding: 20px; background: var(--main); color: white; 
            border: none; border-radius: 20px; font-size: 1.15rem; font-weight: 800; 
            margin-top: 30px; cursor: pointer; transition: 0.3s; 
            box-shadow: 0 10px 25px rgba(255,140,0,0.35);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .refresh-btn:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(255,140,0,0.2); }

        /* वापस जाने का 'सही' लिंक */
        .back-nav {
            display: block; text-align: center; margin-top: 25px;
            color: var(--dark); text-decoration: none; font-weight: 700; font-size: 0.95rem;
            padding: 14px; border: 2.5px solid var(--dark); border-radius: 18px;
            transition: 0.3s;
        }
        .back-nav:active { background: var(--dark); color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; font-weight: 700;">प्रतीक्षा डिजिटल डैशबोर्ड</h2>
        <p style="margin:5px 0; color: #555; font-size: 14px; font-weight: 600;">अम्बाबाड़ी, जयपुर | Titu 5G संचालित</p>
    </div>

    <div class="card-main">
        <span>आज की कुल कमाई (Collection)</span>
        <h2 id="todayColl">₹ 0</h2>
        <small id="totalColl" style="font-weight: 700; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 10px;">कुल संचित कमाई: ₹ 0</small>
    </div>

    <div class="grid">
        <div class="stat-box"><h4>पेंडिंग आर्डर</h4><p id="pending">0</p></div>
        <div class="stat-box"><h4>धुलाई में</h4><p id="washing">0</p></div>
        <div class="stat-box"><h4>रेडी कपड़े</h4><p id="ready">0</p></div>
        <div class="stat-box"><h4>कुल ग्राहक</h4><p id="customers">0</p></div>
    </div>

    <button class="refresh-btn" onclick="fetchData()">🔄 डेटा अपडेट करें</button>

    <a href="admin-update.html" class="back-nav">← एडमिन अपडेट पर वापस जाएं</a>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzjxuEKlq41GrTwymM1Ywb1AjHhZ-qd6e865F65zf02Eiw4ZkVFnWNw_IwLPGVVv7yH6A/exec';

        function fetchData() {
            const btn = document.querySelector('.refresh-btn');
            btn.style.opacity = "0.6";
            btn.innerText = "हिसाब मिल रहा है...";
            
            fetch(`${scriptURL}?action=getDashboardData`)
            .then(response => response.json())
            .then(data => {
                document.getElementById('todayColl').innerText = '₹ ' + (data.todayColl || 0);
                document.getElementById('totalColl').innerText = 'कुल संचित कमाई: ₹ ' + (data.collection || 0);
                document.getElementById('pending').innerText = data.pending || 0;
                document.getElementById('washing').innerText = data.washing || 0;
                document.getElementById('ready').innerText = data.ready || 0;
                document.getElementById('customers').innerText = data.totalCustomers || 0;
                
                btn.style.opacity = "1";
                btn.innerText = "🔄 डेटा अपडेट करें";
            })
            .catch(error => {
                alert("डेटा नहीं मिल सका। कृपया इंटरनेट चेक करें।");
                btn.style.opacity = "1";
                btn.innerText = "🔄 डेटा अपडेट करें";
            });
        }

        window.onload = fetchData;
    </script>
</body>
</html>
