<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Dashboard | PRATIKSHA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sun: #FF8C00; --dark: #001F3F; --green: #2E8B57; --bg: #f4f7f6; --jupiter: #FFF9C4; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { margin: 0; color: var(--dark); font-size: 1.4rem; }
        .date-badge { display: inline-block; padding: 5px 12px; background: var(--jupiter); border: 1px solid var(--sun); border-radius: 20px; font-size: 0.75rem; margin-top: 5px; font-weight: 600; color: #444; }

        /* आज का मुख्य कार्ड */
        .full-card { background: var(--dark); color: white; padding: 25px 15px; border-radius: 20px; text-align: center; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .full-card h4 { margin: 0; opacity: 0.8; font-weight: 400; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .full-card h2 { margin: 8px 0 0; font-size: 2.4rem; color: var(--sun); }
        .total-info { font-size: 0.8rem; opacity: 0.7; margin-top: 10px; display: block; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px; }

        /* स्टेट्स ग्रिड */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 4px solid var(--sun); }
        .stat-card h4 { margin: 0; font-size: 0.7rem; color: #7f8c8d; text-transform: uppercase; }
        .stat-card p { margin: 8px 0 0; font-size: 1.3rem; font-weight: 700; color: var(--dark); }

        .refresh-btn { width: 100%; padding: 15px; background: var(--sun); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1rem; box-shadow: 0 4px 12px rgba(255,140,0,0.2); }
        .refresh-btn:active { transform: scale(0.98); }

        .nav-back { margin-top: 20px; text-align: center; }
        .nav-back a { color: var(--dark); text-decoration: none; font-size: 0.85rem; font-weight: 600; padding: 10px 18px; border: 1.5px solid #d1d8e0; border-radius: 10px; display: inline-block; background: white; }
    </style>
</head>
<body>

    <div class="header">
        <h2>प्रतीक्षा डिजिटल रिपोर्ट</h2>
        <div id="displayDate" class="date-badge">तारीख लोड हो रही है...</div>
    </div>

    <div class="full-card">
        <h4>आज की कुल कमाई</h4>
        <h2 id="todayCollection">₹ 0</h2>
        <span class="total-info" id="lifeTimeColl">कुल संचित कमाई: ₹ 0</span>
    </div>

    <div class="stats-grid">
        <div class="stat-card" style="border-color: #3498db;">
            <h4>आज के ऑर्डर्स</h4>
            <p id="todayOrders">0</p>
        </div>
        <div class="stat-card" style="border-color: #e74c3c;">
            <h4>पेंडिंग काम</h4>
            <p id="totalPending">0</p>
        </div>
        <div class="stat-card" style="border-color: var(--green);">
            <h4>धुलाई में</h4>
            <p id="washingOrders">0</p>
        </div>
        <div class="stat-card" style="border-color: var(--dark);">
            <h4>कुल ग्राहक</h4>
            <p id="totalCust">0</p>
        </div>
    </div>

    <button class="refresh-btn" id="refreshBtn" onclick="loadStats()">🔄 डेटा रिफ्रेश करें</button>

    <div class="nav-back">
        <a href="admin-update.html">← वापस एडमिन पैनल</a>
    </div>

    <script>
        // आपका नया Web App URL यहाँ जुड़ गया है
        const scriptURL = 'https://script.google.com/macros/s/AKfycbx-Cu2CNgnLn6685hq40wxSW1AzK5fXJx91fDUGVEJvhvq8eDxRSZ7fhKDFrCCT2p8/exec';

        function loadStats() {
            const btn = document.getElementById('refreshBtn');
            const dateBox = document.getElementById('displayDate');
            btn.innerText = "हिसाब मिलान हो रहा है...";
            btn.disabled = true;

            // आज की तारीख
            const todayStr = new Date().toLocaleDateString('en-GB'); 
            dateBox.innerText = "आज की रिपोर्ट: " + todayStr;

            fetch(`${scriptURL}?action=getDashboardData`)
            .then(res => res.json())
            .then(data => {
                // आज का हिसाब (Apps Script से आ रहा है)
                document.getElementById('todayCollection').innerText = '₹ ' + (data.todayCollection || 0).toLocaleString('en-IN');
                document.getElementById('todayOrders').innerText = data.todayOrders || 0;
                
                // कुल और पुराने पेंडिंग डेटा
                document.getElementById('lifeTimeColl').innerText = 'कुल संचित कमाई: ₹ ' + (data.collection || 0).toLocaleString('en-IN');
                document.getElementById('totalPending').innerText = data.pending || 0;
                document.getElementById('washingOrders').innerText = data.washing || 0;
                document.getElementById('totalCust').innerText = data.totalCustomers || 0;

                btn.innerText = "🔄 डेटा रिफ्रेश करें";
                btn.disabled = false;
            })
            .catch(err => {
                btn.innerText = "विफल! नेटवर्क चेक करें";
                btn.disabled = false;
                console.error("Dashboard Error:", err);
            });
        }

        // पेज लोड होते ही डेटा दिखाएँ
        window.onload = loadStats;
    </script>
</body>
</html>
