<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | PRATIKSHA DIGITAL</title>
    <style>
        :root { --sun: #FF8C00; --dark: #001F3F; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 25px; }
        .full-card { background: var(--dark); color: white; padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .full-card h2 { margin: 10px 0; font-size: 2.5rem; color: var(--sun); }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--sun); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-card p { margin: 10px 0 0; font-size: 1.5rem; font-weight: 700; color: var(--dark); }
        .refresh-btn { width: 100%; padding: 18px; background: var(--sun); color: white; border: none; border-radius: 15px; font-weight: 700; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="color: var(--dark); margin:0;">प्रतीक्षा डिजिटल डैशबोर्ड</h2>
        <p style="color: #666; font-size: 0.9rem;">Titu 5G Engine Enabled</p>
    </div>

    <div class="full-card">
        <h4>आज की कमाई (Today)</h4>
        <h2 id="todayCollection">₹ 0</h2>
        <p id="lifeTimeColl" style="opacity: 0.7; font-size: 0.9rem;">कुल संचित कमाई: ₹ 0</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h4>आज के ऑर्डर्स</h4><p id="todayOrders">0</p></div>
        <div class="stat-card"><h4>पेंडिंग काम</h4><p id="totalPending">0</p></div>
        <div class="stat-card"><h4>धुलाई में</h4><p id="washingOrders">0</p></div>
        <div class="stat-card"><h4>कुल ग्राहक</h4><p id="totalCust">0</p></div>
    </div>

    <button class="refresh-btn" onclick="loadStats()">🔄 डेटा अपडेट करें</button>

    <script>
        // आपका नया Titu 5G URL यहाँ अपडेट कर दिया गया है
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyujqlO4tdoEkqgjTRcoFFtBmfMO0wuBege2HpGXsvn49CfLViQECdJ4DmCiKilfA0G/exec';

        function loadStats() {
            const btn = document.querySelector('.refresh-btn');
            btn.innerText = "हिसाब मिल रहा है...";

            fetch(`${scriptURL}?action=getDashboardData`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('todayCollection').innerText = '₹ ' + (data.todayCollection || 0);
                document.getElementById('todayOrders').innerText = data.todayOrders || 0;
                document.getElementById('lifeTimeColl').innerText = 'कुल संचित कमाई: ₹ ' + (data.collection || 0);
                document.getElementById('totalPending').innerText = data.pending || 0;
                document.getElementById('washingOrders').innerText = data.washing || 0;
                document.getElementById('totalCust').innerText = data.totalCustomers || 0;
                btn.innerText = "🔄 डेटा अपडेट करें";
            })
            .catch(err => {
                alert("नेटवर्क एरर: कृपया Google Sheet में 'Share' सेटिंग चेक करें।");
                btn.innerText = "🔄 डेटा अपडेट करें";
            });
        }
        window.onload = loadStats;
    </script>
</body>
</html>
