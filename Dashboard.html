<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Dashboard | PRATIKSHA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sun: #FF8C00; --dark: #001F3F; --green: #2E8B57; --bg: #f4f7f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 25px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 4px solid var(--sun); }
        .stat-card h4 { margin: 0; font-size: 0.8rem; color: #666; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 1.5rem; font-weight: 700; color: var(--dark); }
        .full-card { background: var(--dark); color: white; padding: 25px; border-radius: 15px; text-align: center; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .full-card h2 { margin: 0; font-size: 2rem; color: var(--sun); }
        .refresh-btn { width: 100%; padding: 15px; background: var(--sun); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .nav-back { margin-top: 15px; text-align: center; }
        .nav-back a { color: var(--dark); text-decoration: none; font-size: 0.9rem; font-weight: bold; padding: 10px; border: 1px solid #ccc; border-radius: 8px; display: inline-block; }
        .date-badge { display: inline-block; padding: 5px 15px; background: #FFF9C4; border-radius: 20px; font-size: 0.75rem; margin-bottom: 10px; color: #333; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; color: var(--dark);">प्रतीक्षा बिज़नेस रिपोर्ट</h2>
        <div id="todayDate" class="date-badge">तारीख अपडेट हो रही है...</div>
    </div>

    <div class="full-card">
        <h4 style="margin:0; opacity: 0.8;">कुल कलेक्शन (Total)</h4>
        <h2 id="totalCollection">₹ 0</h2>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h4>कुल ग्राहक</h4><p id="totalCust">0</p></div>
        <div class="stat-card" style="border-color: #e74c3c;"><h4>पेंडिंग</h4><p id="pendingOrders">0</p></div>
        <div class="stat-card" style="border-color: #3498db;"><h4>धुलाई</h4><p id="washingOrders">0</p></div>
        <div class="stat-card" style="border-color: var(--green);"><h4>रेडी</h4><p id="readyOrders">0</p></div>
    </div>

    <button class="refresh-btn" id="refreshBtn" onclick="loadStats()">🔄 डेटा रिफ्रेश करें</button>

    <div class="nav-back">
        <a href="admin-update.html">वापस एडमिन पैनल पर जाएँ</a>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbx-Cu2CNgnLn6685hq40wxSW1AzK5fXJx91fDUGVEJvhvq8eDxRSZ7fhKDFrCCT2p8/exec';

        function loadStats() {
            const btn = document.getElementById('refreshBtn');
            const dateDisplay = document.getElementById('todayDate');
            btn.innerText = "डेटा लोड हो रहा है...";
            
            const todayStr = new Date().toLocaleDateString('en-GB'); 
            dateDisplay.innerText = "आज की तारीख: " + todayStr;

            // आपकी स्क्रिप्ट की action 'getDashboardData' का ही उपयोग कर रहे हैं
            fetch(`${scriptURL}?action=getDashboardData`)
            .then(res => res.json())
            .then(data => {
                // यह हिस्सा वही डेटा दिखाएगा जो आपकी Script लाइन 61-65 में कैलकुलेट कर रही है
                document.getElementById('pendingOrders').innerText = data.pending || 0;
                document.getElementById('washingOrders').innerText = data.washing || 0;
                document.getElementById('readyOrders').innerText = data.ready || 0;
                document.getElementById('totalCollection').innerText = '₹ ' + (data.collection || 0);
                document.getElementById('totalCust').innerText = data.totalCustomers || 0;
                
                btn.innerText = "🔄 डेटा रिफ्रेश करें";
            })
            .catch(err => {
                btn.innerText = "नेटवर्क एरर! पुनः प्रयास करें";
                console.error(err);
            });
        }
        window.onload = loadStats;
    </script>
</body>
</html>
