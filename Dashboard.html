<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>डैशबोर्ड | प्रतीक्षा ड्राईक्लीनर्स</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Mukta:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --main: #FF8C00; --dark: #001F3F; --light: #f0f4f8; --white: #ffffff; }
        body { font-family: 'Inter', 'Mukta', sans-serif; background: var(--light); margin: 0; padding: 15px; }
        .header { text-align: center; padding: 20px 0; color: var(--dark); }
        
        .card-main { 
            background: linear-gradient(135deg, var(--dark) 0%, #003366 100%); 
            color: white; padding: 30px 20px; border-radius: 28px; 
            text-align: center; box-shadow: 0 15px 35px rgba(0,31,63,0.25); 
            margin-bottom: 25px; border-bottom: 6px solid var(--main); 
        }
        .card-main h2 { font-size: 3rem; margin: 10px 0; color: var(--main); font-weight: 700; }
        
        /* 🌸 SIP प्रोग्रेस बार का स्टाइल */
        .sip-box { margin-top: 15px; background: rgba(255,255,255,0.1); padding: 12px; border-radius: 15px; }
        .progress-bg { background: rgba(255,255,255,0.2); height: 8px; border-radius: 4px; margin: 8px 0; overflow: hidden; }
        .progress-fill { background: var(--main); height: 100%; width: 0%; transition: 1s ease-in-out; }
        .sip-label { font-size: 0.75rem; display: flex; justify-content: space-between; opacity: 0.9; font-weight: 600; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .stat-box { 
            background: var(--white); padding: 20px 10px; border-radius: 22px; 
            text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.06); 
            border-left: 5px solid var(--main);
        }
        .stat-box h4 { margin: 0; color: #7f8c8d; font-size: 0.75rem; text-transform: uppercase; font-weight: 700; }
        .stat-box p { margin: 10px 0 0; font-size: 1.8rem; font-weight: 800; color: var(--dark); }

        .refresh-btn { 
            width: 100%; padding: 18px; background: var(--main); color: white; 
            border: none; border-radius: 20px; font-size: 1.1rem; font-weight: 800; 
            margin-top: 20px; cursor: pointer; box-shadow: 0 10px 25px rgba(255,140,0,0.3);
        }
        .back-nav {
            display: block; text-align: center; margin-top: 20px; color: var(--dark);
            text-decoration: none; font-weight: 700; padding: 12px; border: 2.5px solid var(--dark); border-radius: 15px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">प्रतीक्षा डिजिटल डैशबोर्ड</h2>
        <p style="margin:5px 0; color: #555; font-size: 14px; font-weight: 600;">सेवा • शुचिता • 2047 का संकल्प</p>
    </div>

    <div class="card-main">
        <span>आज की कमाई</span>
        <h2 id="todayColl">₹ 0</h2>
        
        <div class="sip-box">
            <div class="sip-label">
                <span>दैनिक लक्ष्य (SIP ₹2500 हेतु)</span>
                <span id="perc">0%</span>
            </div>
            <div class="progress-bg"><div id="bar" class="progress-fill"></div></div>
        </div>
        <small id="totalColl" style="display:block; margin-top:10px; font-weight:700; opacity:0.8;">कुल संचित: ₹ 0</small>
    </div>

    <div class="grid">
        <div class="stat-box"><h4>पेंडिंग</h4><p id="pending">0</p></div>
        <div class="stat-box"><h4>धुलाई</h4><p id="washing">0</p></div>
        <div class="stat-box"><h4>रेडी</h4><p id="ready">0</p></div>
        <div class="stat-box"><h4>कुल ग्राहक</h4><p id="customers">0</p></div>
    </div>

    <button class="refresh-btn" onclick="fetchData()">🔄 डेटा अपडेट करें</button>
    <a href="admin-update.html" class="back-nav">← एडमिन पैनल पर जाएं</a>

    <script>
        // ✅ आपका नया डिप्लॉयमेंट लिंक यहाँ अपडेट कर दिया गया है
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzlTe0mIbSAS1xxgy3imkn3M6AoR4HkCed-XHDy2lSln2j9kA74rBYoITi2iki90qdu/exec';

        function fetchData() {
            const btn = document.querySelector('.refresh-btn');
            btn.innerText = "हिसाब मिल रहा है...";
            
            fetch(`${scriptURL}?action=getDashboardData`)
            .then(res => res.json())
            .then(data => {
                const today = data.todayColl || 0;
                document.getElementById('todayColl').innerText = '₹ ' + today;
                document.getElementById('totalColl').innerText = 'कुल संचित कमाई: ₹ ' + (data.collection || 0);
                document.getElementById('pending').innerText = data.pending || 0;
                document.getElementById('washing').innerText = data.washing || 0;
                document.getElementById('ready').innerText = data.ready || 0;
                document.getElementById('customers').innerText = data.totalCustomers || 0;

                // ₹2500 मासिक SIP के हिसाब से दैनिक औसत लक्ष्य ₹100 मानकर प्रोग्रेस दिखाना
                let dailyTarget = 100; 
                let progress = Math.min((today / dailyTarget) * 100, 100);
                document.getElementById('bar').style.width = progress + "%";
                document.getElementById('perc').innerText = Math.round(progress) + "%";
                
                btn.innerText = "🔄 डेटा अपडेट करें";
            })
            .catch(err => {
                alert("कनेक्शन एरर!");
                btn.innerText = "🔄 डेटा अपडेट करें";
            });
        }
        window.onload = fetchData;
    </script>
</body>
</html>
